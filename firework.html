<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2024年新年快乐！</title>
<style>
  body, html {
    height: 100%;
    margin: 0;
    background: #000; /* 背景设为黑色 */
  }
  canvas {
    display: block;
    background: #000;
  }
</style>
</head>
<body>
<canvas id="fireworksCanvas"></canvas>
<script>
  const canvas = document.getElementById('fireworksCanvas');
  const context = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  class Firework {
    constructor(x, y, targetX, targetY, color) {
      this.x = x;
      this.y = y;
      this.sx = x;
      this.sy = y;
      this.targetX = targetX;
      this.targetY = targetY;
      this.color = color;
      this.distanceToTarget = calculateDistance(x, y, targetX, targetY);
      this.distanceTraveled = 0;
      this.coordinates = [];
      this.coordinateCount = 3;
      while (this.coordinateCount--) {
        this.coordinates.push([this.x, this.y]);
      }
      this.angle = Math.atan2(targetY - y, targetX - x);
      this.speed = 2;
      this.acceleration = 1.05;
      this.brightness = random(50, 70);
      this.targetRadius = 1;
    }
    update(index) {
      this.coordinates.pop();
      this.coordinates.unshift([this.x, this.y]);

      if (this.targetRadius < 8) {
        this.targetRadius += 0.3;
      } else {
        this.targetRadius = 1;
      }

      this.speed *= this.acceleration;

      let vx = Math.cos(this.angle) * this.speed,
          vy = Math.sin(this.angle) * this.speed;
      this.distanceTraveled = calculateDistance(this.sx, this.sy, this.x + vx, this.y + vy);

      if (this.distanceTraveled >= this.distanceToTarget) {
        createParticles(this.targetX, this.targetY, this.color);
        fireworks.splice(index, 1);
      } else {
        this.x += vx;
        this.y += vy;
      }
    }
    draw() {
      context.beginPath();
      context.moveTo(this.coordinates[this.coordinates.length - 1][0], this.coordinates[this.coordinates.length - 1][1]);
      context.lineTo(this.x, this.y);
      context.strokeStyle = 'hsl(' + this.color + ', 100%, ' + this.brightness + '%)';
      context.stroke();

      context.beginPath();
      context.arc(this.targetX, this.targetY, this.targetRadius, 0, Math.PI * 2);
      context.stroke();
    }
  }

  class Particle {
    constructor(x, y, color) {
      this.x = x;
      this.y = y;
      this.coordinates = [];
      this.coordinateCount = 5;
      while(this.coordinateCount--) {
        this.coordinates.push([this.x, this.y]);
      }
      this.angle = random(0, Math.PI * 2);
      this.speed = random(1, 10);
      this.friction = 0.95;
      this.gravity = 1;
      this.hue = random(color - 20, color + 20);
      this.brightness = random(50, 80);
      this.alpha = 1;
      this.decay = random(0.015, 0.03);
    }

    update(index) {
      this.coordinates.pop();
      this.coordinates.unshift([this.x, this.y]);
      this.speed *= this.friction;
      this.x += Math.cos(this.angle) * this.speed;
      this.y += Math.sin(this.angle) * this.speed + this.gravity;
      this.alpha -= this.decay;

      if(this.alpha <= this.decay) {
        particles.splice(index, 1);
      }
    }

    draw() {
      context.beginPath();
      context.moveTo(this.coordinates[this.coordinates.length - 1][0], this.coordinates[this.coordinates.length - 1][1]);
      context.lineTo(this.x, this.y);
      context.strokeStyle = 'hsla(' + this.hue + ', 100%, ' + this.brightness + '%, ' + this.alpha + ')';
      context.stroke();
    }
  }

  const fireworks = [];
  const particles = [];

  function random(min, max) {
    return Math.random() * (max - min) + min;
  }

  function calculateDistance(p1x, p1y, p2x, p2y) {
    let xDistance = p1x - p2x, yDistance = p1y - p2y;
    return Math.sqrt(Math.pow(xDistance, 2) + Math.pow(yDistance, 2));
  }

  function createParticles(x, y, color) {
    let particleCount = 30;
    while (particleCount--) {
      particles.push(new Particle(x, y, color));
    }
  }

  function loop() {
    requestAnimationFrame(loop);

    context.globalCompositeOperation = 'destination-out';
    context.fillStyle = 'rgba(0, 0, 0, 0.5)';
    context.fillRect(0, 0, canvas.width, canvas.height);
    context.globalCompositeOperation = 'lighter';

    let i = fireworks.length;
    while(i--) {
      fireworks[i].draw();
      fireworks[i].update(i);
    }

    let j = particles.length;
    while(j--) {
      particles[j].draw();
      particles[j].update(j);
    }

    if (random(0, 1) < 0.05) {
      fireworks.push(new Firework(
        canvas.width / 2,
        canvas.height,
        random(0, canvas.width),
        random(0, canvas.height / 2),
        random(0, 360)
      ));
    }
  }

  window.addEventListener('resize', function() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });

  loop();
</script>
</body>
</html>
