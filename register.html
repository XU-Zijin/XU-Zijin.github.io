<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>信息登记</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f8f8f8;
            padding: 20px;
            margin: 0;
        }

        h2 {
            text-align: center;
            color: #333;
        }

        #registration-form {
            background-color: white;
            max-width: 400px;
            padding: 20px;
            margin: 40px auto;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }

        label {
            margin-top: 10px;
            display: block;
            color: #666;
        }

        input[type=text],
        textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box; /* Include padding in total width and height */
        }

        input[type=button] {
            background-color: #4285f4;
            color: white;
            padding: 10px 20px;
            margin-top: 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }

        input[type=button]:hover {
            background-color: #357ae8;
        }
    </style>
</head>
<body>
    <h2>信息登记</h2>
    
    <form id="registration-form">
        <label for="name">姓名:</label>
        <input type="text" id="name" name="name" required>

        <label for="message">申请理由/拿这个网站干什么:</label>
        <textarea id="message" name="message" required></textarea>
        
        <input type="button" value="提交" onclick="sendEmail()">
    </form>

    <script>
        function sendEmail() {
            var name = document.getElementById('name').value;
            var message = document.getElementById('message').value;
            
            var mailto_link = 'mailto:xzj@xuzijin.com' +
                              '?Subject=' + encodeURIComponent("来自" + name + "的信息登记") + 
                              '&Body=' + encodeURIComponent("姓名: " + name + "\n申请理由/拿这个网站干什么: " + message);
            
            window.location.href = mailto_link;
        }
    </script>
</body>
</html>
